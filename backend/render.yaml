services:
  - type: web
    name: oneride-backend
    env: go
    buildCommand: go build -o bin/server cmd/main.go
    startCommand: ./bin/server
    healthCheckPath: /health
    disk:
      name: uploads-data
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_PEPPER
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: "/var/data/uploads"
      - key: SENTRY_DSN
        sync: false
